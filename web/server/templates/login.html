<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — imkitchen</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f8;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#18181b;padding:1rem}
    main{background:#fff;padding:1.75rem;border-radius:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);max-width:22rem;width:100%}
    h1{margin:0 0 .25rem;font-size:1.375rem}
    p{color:#52525b;margin:0 0 1.25rem;font-size:.9375rem}
    form{display:grid;gap:.5rem}
    button{padding:.75rem 1rem;border-radius:.5rem;border:1px solid #d4d4d8;background:#fff;font:inherit;cursor:pointer;font-weight:500}
    button:hover{background:#f4f4f5}
    button.primary{background:#18181b;color:#fff;border-color:#18181b}
    button.primary:hover{background:#27272a}
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <p>Pick a role to continue.</p>
    <form method="post" action="/login">
      <button type="submit" name="role" value="user" class="primary">Sign in as User</button>
      <button type="submit" name="role" value="chef">Sign in as Chef</button>
      <button type="submit" name="role" value="premium">Sign in as Premium</button>
    </form>
  </main>
</body>
</html>

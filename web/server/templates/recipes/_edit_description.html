<section id="edit-description" aria-labelledby="edit-description-heading">
  <h2 id="edit-description-heading" class="mb-3 text-[10px] tracking-widest text-[var(--color-ink-3)] uppercase" style="font-family: var(--font-mono);">
    Description
  </h2>
  <form action="/recipes/{{ recipe_id }}/description" method="post"
        ts-req="/recipes/{{ recipe_id }}/description"
        ts-target="#edit-description"
        class="rounded-2xl border border-[var(--color-line-2)] bg-[var(--color-paper)] p-4 shadow-sm sm:p-5">
    <label for="r-desc" class="mb-1.5 block text-[11px] font-medium text-[var(--color-ink-2)]">
      Description
    </label>
    <textarea id="r-desc" name="description" rows="3"
              placeholder="A short blurb shown above the method…"
              class="block w-full resize-y rounded-lg border border-[var(--color-line)] bg-[var(--color-cream)] px-3 py-2.5 text-sm leading-relaxed text-[var(--color-ink)] focus:border-[var(--color-tangerine)] focus:ring-2 focus:ring-[var(--color-tangerine)] focus:outline-none">{{ description }}</textarea>

    <div class="mt-3 flex items-center gap-3">
      <button type="submit"
              class="inline-flex h-9 items-center gap-2 rounded-xl bg-[var(--color-ink)] px-3 text-[13px] font-semibold text-[var(--color-cream)] hover:bg-[var(--color-ink)]/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-tangerine)]">
        Save description
      </button>
      {% if saved %}
      <span role="status" class="text-[12px] text-[var(--color-herb-ink)]">Saved.</span>
      {% endif %}
    </div>
  </form>
</section>

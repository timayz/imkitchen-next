<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — imkitchen admin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#e2e8f0;padding:1rem}
    main{background:#1e293b;padding:1.75rem;border-radius:.75rem;box-shadow:0 4px 6px rgba(0,0,0,.3);max-width:22rem;width:100%;border:1px solid #334155}
    h1{margin:0 0 .25rem;font-size:1.375rem}
    p{color:#94a3b8;margin:0 0 1.25rem;font-size:.9375rem}
    form{display:grid;gap:.5rem}
    button{padding:.75rem 1rem;border-radius:.5rem;border:1px solid #334155;background:#0ea5e9;color:#fff;font:inherit;cursor:pointer;font-weight:500}
    button:hover{background:#0284c7}
  </style>
</head>
<body>
  <main>
    <h1>Admin sign in</h1>
    <p>Sign in as admin to continue.</p>
    <form method="post" action="/login">
      <button type="submit" name="role" value="admin">Sign in as Admin</button>
    </form>
  </main>
</body>
</html>
